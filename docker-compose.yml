version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tradingfloor
      POSTGRES_USER: tradingfloor
      POSTGRES_PASSWORD: tradingfloor_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingfloor -d tradingfloor"]
      interval: 10s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"
      - "9009:9009"
      - "8812:8812"
    volumes:
      - questdata:/root/.questdb

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  monitors:
    build: .
    command: python scripts/run_monitors.py
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://tradingfloor:tradingfloor_dev@postgres:5432/tradingfloor
    env_file:
      - .env
    restart: unless-stopped

  portfolio-chief:
    build: .
    command: python -c "import asyncio; from src.oversight.portfolio_chief import run; asyncio.run(run())"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    restart: unless-stopped

volumes:
  pgdata:
  questdata:
  redisdata:
