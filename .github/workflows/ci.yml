name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: tradingfloor
          POSTGRES_USER: tradingfloor
          POSTGRES_PASSWORD: tradingfloor_dev
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check src/ tests/

      - name: Type check — mypy
        run: mypy src/

      - name: Test — pytest
        env:
          DATABASE_URL: postgresql+asyncpg://tradingfloor:tradingfloor_dev@localhost:5432/tradingfloor
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --asyncio-mode=auto
